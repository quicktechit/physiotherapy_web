name: e_prescription
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  get_storage: ^2.1.1
  lottie: ^3.3.1
  google_fonts: ^6.3.0
  flutter_spinkit: ^5.2.1
  flutter_screenutil: ^5.9.3
  intl:  ^0.20.2
  image_picker: ^1.1.2
  carousel_slider: ^5.1.1
  animated_bottom_navigation_bar: ^1.4.0
  bottom_navy_bar: ^6.1.0
  flutter_launcher_icons: ^0.14.4
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  open_file: ^3.5.10
  file_picker: ^10.2.0
  font_awesome_flutter:
  language_helper: ^0.5.4
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  http: ^1.4.0
  url_launcher: ^6.3.1
  syncfusion_flutter_pdfviewer: ^31.1.19
  flutter_html: ^3.0.0
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  google_sign_in:  ^6.1.5
  file_saver: ^0.3.1
  permission_handler: ^12.0.1
  get_it: ^9.1.1
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
dev_dependencies:
  flutter_test:
    sdk: flutter
 

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Notosan
      fonts:
        - asset: assets/fonts/Notosan.ttf
    
    - family: Siyamrupali
      fonts:
        - asset: assets/fonts/Siyamrupali.ttf
    
    - family: SolaimanLipi
      fonts:
        - asset: assets/fonts/SolaimanLipi.ttf
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
